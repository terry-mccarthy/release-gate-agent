[project]
name = "harness-validator"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "jsonschema>=4.22",
    "pyyaml>=6.0",
    "harness-gateway",
]

[project.optional-dependencies]
ollama = ["ollama>=0.3"]
gemini = ["google-genai"]

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
